<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="h0-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur" />
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0
                0 0.4 0.4 0 0
                0 0 0.6 0 0
                0 0 0 0.3 0" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#h0-glow)">
    <!-- 空心轮廓 (0% 填充，仅底色 + 描边) -->
    <path
      d="M50 88
         C 25 70, 4 52, 4 34
         C 4 18, 16 8, 30 8
         C 38 8, 45 12, 50 20
         C 55 12, 62 8, 70 8
         C 84 8, 96 18, 96 34
         C 96 52, 75 70, 50 88Z"
      fill="rgba(255,200,220,0.15)"
      stroke="rgba(255,245,248,0.9)"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>
</svg>
