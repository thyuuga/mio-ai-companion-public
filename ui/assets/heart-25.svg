<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="h25-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur" />
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0
                0 0.4 0.4 0 0
                0 0 0.6 0 0
                0 0 0 0.3 0" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="h25-gradient" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF6FA3" />
      <stop offset="40%" stop-color="#FF8FBA" />
      <stop offset="100%" stop-color="#FFBDD6" />
    </linearGradient>

    <!-- 心形裁剪 -->
    <clipPath id="h25-shape">
      <path d="M50 88
               C 25 70, 4 52, 4 34
               C 4 18, 16 8, 30 8
               C 38 8, 45 12, 50 20
               C 55 12, 62 8, 70 8
               C 84 8, 96 18, 96 34
               C 96 52, 75 70, 50 88Z" />
    </clipPath>
  </defs>

  <g filter="url(#h25-glow)">
    <!-- 底层: 空心淡色底 -->
    <path
      d="M50 88
         C 25 70, 4 52, 4 34
         C 4 18, 16 8, 30 8
         C 38 8, 45 12, 50 20
         C 55 12, 62 8, 70 8
         C 84 8, 96 18, 96 34
         C 96 52, 75 70, 50 88Z"
      fill="rgba(255,200,220,0.15)"
      stroke="rgba(255,240,245,0.85)"
      stroke-width="2"
      stroke-linejoin="round"
    />

    <!-- 液体波浪填充层，被心形裁剪 -->
    <g clip-path="url(#h25-shape)">
      <!-- 后浪 (半透明，相位偏移) -->
      <path fill="rgba(255,143,186,0.3)"
        d="M-50 62
           Q-37.5 58, -25 62 Q-12.5 66, 0 62
           Q12.5 58, 25 62   Q37.5 66, 50 62
           Q62.5 58, 75 62   Q87.5 66, 100 62
           Q112.5 58, 125 62 Q137.5 66, 150 62
           V100 H-50 Z">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; -50,0" dur="4s" repeatCount="indefinite" />
      </path>
      <!-- 前浪 (主填充) -->
      <path fill="url(#h25-gradient)"
        d="M-50 60
           Q-37.5 57, -25 60 Q-12.5 63, 0 60
           Q12.5 57, 25 60   Q37.5 63, 50 60
           Q62.5 57, 75 60   Q87.5 63, 100 60
           Q112.5 57, 125 60 Q137.5 63, 150 60
           V100 H-50 Z">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; -50,0" dur="3s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- 外轮廓描边 -->
    <path
      d="M50 88
         C 25 70, 4 52, 4 34
         C 4 18, 16 8, 30 8
         C 38 8, 45 12, 50 20
         C 55 12, 62 8, 70 8
         C 84 8, 96 18, 96 34
         C 96 52, 75 70, 50 88Z"
      fill="none"
      stroke="rgba(255,245,248,0.9)"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>
</svg>
