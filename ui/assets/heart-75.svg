<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="h75-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur" />
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0
                0 0.4 0.4 0 0
                0 0 0.6 0 0
                0 0 0 0.3 0" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="h75-gradient" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF6FA3" />
      <stop offset="40%" stop-color="#FF8FBA" />
      <stop offset="100%" stop-color="#FFBDD6" />
    </linearGradient>

    <clipPath id="h75-shape">
      <path d="M50 88
               C 25 70, 4 52, 4 34
               C 4 18, 16 8, 30 8
               C 38 8, 45 12, 50 20
               C 55 12, 62 8, 70 8
               C 84 8, 96 18, 96 34
               C 96 52, 75 70, 50 88Z" />
    </clipPath>
  </defs>

  <g filter="url(#h75-glow)">
    <!-- 底层: 空心淡色底 -->
    <path
      d="M50 88
         C 25 70, 4 52, 4 34
         C 4 18, 16 8, 30 8
         C 38 8, 45 12, 50 20
         C 55 12, 62 8, 70 8
         C 84 8, 96 18, 96 34
         C 96 52, 75 70, 50 88Z"
      fill="rgba(255,200,220,0.15)"
      stroke="rgba(255,240,245,0.85)"
      stroke-width="2"
      stroke-linejoin="round"
    />

    <!-- 液体波浪填充层，被心形裁剪 -->
    <g clip-path="url(#h75-shape)">
      <!-- 后浪 -->
      <path fill="rgba(255,143,186,0.3)"
        d="M-50 27
           Q-37.5 24, -25 27 Q-12.5 30, 0 27
           Q12.5 24, 25 27   Q37.5 30, 50 27
           Q62.5 24, 75 27   Q87.5 30, 100 27
           Q112.5 24, 125 27 Q137.5 30, 150 27
           V100 H-50 Z">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; -50,0" dur="4s" repeatCount="indefinite" />
      </path>
      <!-- 前浪 -->
      <path fill="url(#h75-gradient)"
        d="M-50 25
           Q-37.5 22, -25 25 Q-12.5 28, 0 25
           Q12.5 22, 25 25   Q37.5 28, 50 25
           Q62.5 22, 75 25   Q87.5 28, 100 25
           Q112.5 22, 125 25 Q137.5 28, 150 25
           V100 H-50 Z">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; -50,0" dur="3s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- 外轮廓描边 -->
    <path
      d="M50 88
         C 25 70, 4 52, 4 34
         C 4 18, 16 8, 30 8
         C 38 8, 45 12, 50 20
         C 55 12, 62 8, 70 8
         C 84 8, 96 18, 96 34
         C 96 52, 75 70, 50 88Z"
      fill="none"
      stroke="rgba(255,245,248,0.9)"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>
</svg>
